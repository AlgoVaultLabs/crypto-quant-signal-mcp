# GEO-AUTOPILOT-W1 (C1) — the autopilot objective-function SoT.
#
# Read at weekly-cron-fire time by dist/lib/geo-decide.js::loadObjective() (js-yaml,
# the same idiom + path resolution as geo-queries.yaml). Tuning the loop = edit THIS
# file (new weight / action-type / ladder reference), ZERO code change — the
# compounding artifact. No hardcoded live numbers: the goal ladder is a REFERENCE to
# GEO-goals-and-autopilot.md; live metrics come from /api/performance-public.
version: 1

# The GEO Goal Ladder — REFERENCE only (stage targets live in the doc, never copied
# here, so the loop can't drift from the SoT).
goal_ladder:
  source: GEO-goals-and-autopilot.md
  live_metrics_from: /api/performance-public
  sub_goals: [llm_citation_sov, registry_agent_rank, third_party_proof]
  stages: [exist_and_get_cited, challenger_sov, category_leader]

# HARD priority gate (in order). The scorer ranks ONLY within the highest UNLOCKED
# tier: a blocked engine (0 citations regardless of content) always outranks any
# third-party or owned move. This is what prevents auto-spamming owned pages.
priority_gate:
  - eligibility
  - third_party
  - owned_content

# Eligibility = index/crawl status — GSC-AUTHORITATIVE, NOT the LLM retrieval-presence probe
# (which lagged + cached the old parking snapshot, falsely flagging gemini "not indexed").
# algovault.com is indexed on all four substrates (GSC Domain-property DNS verification).
# INDEXED != CITED: an engine citing us 0% while we ARE indexed is a CITATION/AUTHORITY problem
# (-> third_party + owned_content), NOT an eligibility block. To assert a REAL index regression,
# REMOVE a substrate below (re-verify in GSC, never the site: proxy) -> the gate fires tier-1.
eligibility:
  indexed_substrates: [Bing, Brave, Google, own]   # all four indexed (GSC-authoritative truth)

# Revenue-proximity weight per query tier (keyed to landing/Prompt/geo-queries.yaml
# tiers: head / niche / branded). AUTOPILOT = expected-VALUE weight (volume x buyer-
# qualification). Branded queries (composite / agent-API / verifiable-track-record)
# are lower-volume but higher-qualified + moat-aligned -> lifted (architect-ratified).
# Win-probability is NOT encoded here; it lives in expected_lift.
#
# INTENTIONALLY DIVERGES from src/lib/geo-gap-list.ts:29 TIER_WEIGHT
# {head:1.0, niche:0.6, branded:0.4} (the editorial COVERAGE weight). Two different
# weights by design: coverage-weight (gap-list) vs expected-value-weight (autopilot).
# Cross-ref comment lives in both files. This is intent, not drift.
revenue_proximity:
  head: 1.0
  branded: 0.8
  niche: 0.6

# score within the unlocked tier (implemented in geo-decide.ts::scoreWeek; keep this
# string in sync with that function — it is the documented form of the computation).
score_formula: "expected_lift * revenue_proximity * product_fit * automatability / effort"

# Product-fit multiplier per query_id (0..1) — "can AlgoVault CREDIBLY own this query?".
# Sourced from brand-facts honest-scope, NOT volume. Default (unmapped) = 1.0 (on-fit).
# GEO-TARGET-DIGEST-REDESIGN-W1 (2026-07-15): the two off-product misfits this map used to
# down-weight (best-python-backtester 0.15 / python-quant-for-ai 0.2 — AlgoVault is the signal a
# backtest/framework CALLS, never the backtester/framework itself) are now DROPPED from
# geo-queries.yaml entirely, so no live query is off-fit → the map is empty (every query defaults
# to 1.0). The mechanism is RETAINED: add a `<query_id>: <0..1>` row to down-weight any FUTURE
# misfit the scorer would otherwise surface. INVARIANT (geo-gap-list canary): inject_threshold >=
# open_query.product_fit_threshold (holds trivially while product_fit is empty).
product_fit: {}

# ── GEO-TARGET-DIGEST-REDESIGN-W1 (2026-07-15) — the conversion-tiered TARGET SET (the SoT) ──
# The ONE place every query's conversion classification lives. BOTH the scorer's earned-routing
# (geo-decide.ts::scoreWeek — a `contested`/`earned` query emits an `earned` press/Reddit/listicle
# move, NEVER a placement on a competitor + NEVER an owned post) AND the digest's Tier-A/B split +
# target-only "who's-winning" filter (geo-digest.ts, via geo-weekly-cron) PROJECT from it — neither
# re-derives it (single-derivation). ORTHOGONAL to geo-queries.yaml `tier` (head/niche/branded =
# revenue_proximity / coverage weight); THIS is the conversion axis:
#   tier:        A  = CONVERSION     (rank hard; measure on SIGNUPS + AI-referred acquisition)
#                B  = BRAND-PRESENCE (AI-discovery visibility; measure on CITATIONS only — NEVER pipeline)
#                contested    = EARNED-ONLY (target via press / Reddit / listicles)
#                measure_only = probe-only (the presence retrieval check; never a target)
#   audience:    T1 | T2 | T3 | ALL | META   (ICP tier served — brand-facts tier framework)
#   target_mode: owned  = seed/own an answer (Tier A + Tier B)
#                earned = press/Reddit/listicle ONLY — never an owned post, never a competitor
#                         placement (contested)
#                measure_only = never a target (the presence probe)
# Every live geo-queries.yaml id is classified (a C3 canary asserts full coverage). Adjustable —
# Mr.1 can reword/retier; a drop/add of a query MUST stay in sync with geo-queries.yaml.
target_set:
  # ── Tier A — CONVERSION (measure on SIGNUPS + AI-referred acquisition) ──
  composite-quant-signal:    { tier: A, audience: T2/T3, target_mode: owned }
  verifiable-track-record:   { tier: A, audience: ALL,   target_mode: owned }
  market-regime-detection:   { tier: A, audience: T2/T3, target_mode: owned }
  crewai-trading-tools:      { tier: A, audience: T3,    target_mode: owned }
  claude-trading-stack:      { tier: A, audience: T3,    target_mode: owned }
  trade-call-not-data:       { tier: A, audience: T3,    target_mode: owned }
  verifiable-winrate-api:    { tier: A, audience: T2/T3, target_mode: owned }
  altfins-alternative:       { tier: A, audience: T2/T3, target_mode: owned }
  x402-signal-api:           { tier: A, audience: T3,    target_mode: owned }
  signal-api-pricing:        { tier: A, audience: ALL,   target_mode: owned }
  retail-signals-verifiable: { tier: A, audience: T1,    target_mode: owned }
  # ── Tier B — BRAND-PRESENCE (measure on CITATIONS only — never counted as signups) ──
  ai-agent-trade-signals:       { tier: B, audience: ALL, target_mode: owned }
  mcp-server-discovery:         { tier: B, audience: T3,  target_mode: owned }
  build-crypto-agent:           { tier: B, audience: T3,  target_mode: owned }
  cross-venue-funding:          { tier: B, audience: T2,  target_mode: owned }
  langchain-crypto-integration: { tier: B, audience: T3,  target_mode: owned }
  llamaindex-quant-stack:       { tier: B, audience: T3,  target_mode: owned }
  # ── CONTESTED — EARNED-ONLY (scorer emits `earned`; never a placement, never an owned post) ──
  best-mcp-trading:  { tier: contested, audience: T3,    target_mode: earned }
  agent-signal-api:  { tier: contested, audience: T2/T3, target_mode: earned }
  # ── presence probe (NOT a target; already excluded from every authority aggregate at SQL) ──
  algovault-exists:  { tier: measure_only, audience: META, target_mode: measure_only }

# OPEN (no-leader) query handling. Most weeks the scorer only emitted "pursue a placement on
# <leader domain>" moves — so an uncontested query (no leader) was invisible or stranded in the
# gated owned_content tier behind an entrenched-but-misfit placement. OPEN queries are the
# EASIEST wins (no incumbent to displace). When a query has NO leader AND product_fit ≥
# product_fit_threshold, scoreWeek emits a `seed_the_answer` move in the third_party tier (own
# the definitive third-party answer, e.g. a dev.to/Medium answer post), with expected_lift
# floored at open_bonus (0→cited on no-leader is easier than displacing a leader → lift HIGH).
open_query:
  move_type: seed_the_answer
  product_fit_threshold: 0.5   # an OPEN query below this is NOT promoted to a seed (we can't credibly own an off-product answer) — it falls to gated owned_content
  open_bonus: 0.9              # expected_lift floor for an uncontested query (defaults HIGH)

# Autopub gate for the gap-persist→injector path (OPS-GEO-GAP-INJECTOR-PRODUCT-FIT-W1).
# A persisted geo_content_gaps row is injectable (eligible for AUTO-PUBLISH via geo_gap_injector)
# only if its product_fit >= inject_threshold. Misfits (best-python-backtester 0.15 / python-quant-
# for-ai 0.2) fall below; on-fit queries (default 1.0) clear it. The injector honors the persisted
# `injectable` column; it never re-reads this yaml (Postgres is the cross-repo boundary).
#
# INTENTIONALLY DISTINCT from open_query.product_fit_threshold above: that gates the SCORER
# SURFACING a move to a human; THIS gates AUTO-PUBLISHING with no human in the loop (only a 12h
# veto). Autopub is higher-risk, so its gate is independent + may later be set STRICTER. INVARIANT
# (asserted in the geo-gap-list canary): inject_threshold >= open_query.product_fit_threshold —
# autopub must NEVER be looser than what the scorer is willing to merely surface.
inject_threshold: 0.5

# Action-type registry: tier order + execution channel + automatability/effort weights.
action_types:
  eligibility:
    tier: 1
    channel: deterministic_or_operator   # IndexNow / sitemap resubmit / Search Console re-crawl, else operator task
    automatability: 0.9
    effort: 0.3
  third_party:
    tier: 2
    channel: draft_for_operator          # awesome-list PR / G2 / listicle / Reddit — DRAFT only, never auto-post (spam-flag)
    automatability: 0.4
    effort: 0.6
  owned_content:
    tier: 3
    channel: cowork_authored_code_wave   # answer/comparison page or dev.to — Cowork-authored, /goal-gated
    automatability: 0.7
    effort: 1.0

# Known drafted action specs (Q3 fast-path): when the chosen move matches a key, the
# brief + digest name the already-drafted spec. Key = "<tier>:<engine-or-query_id>".
known_action_specs:
  "eligibility:gemini": Prompt/fix-gemini-google-index-presence-w1.md

# OPS-GEO-PROBE-SIGNIFICANCE-GATE-W1 — alert-hygiene gate for the weekly digest.
# 🔴 SLIPPING (and its operator-action Telegram WARNING) fires ONLY on a statistically
# meaningful, SUSTAINED citation decline — never on tiny-sample noise. The monitoring
# contract is "fire on sustained/accumulating drift, NOT single-sample breaches": LLM
# retrieval is non-deterministic (published noise floor ≈16%; same prompt cites different
# sources in <30% of identical re-runs) and median time-to-first-citation is ~7d (P90 ~37d),
# so a single >20% week-over-week dip is noise. Read by geo-alert-hygiene.ts::isSignificantDecline
# (via resolveAlertHygiene) — the ONE shared gate behind the digest verdict, the dashboard
# banner, and the TG alert. Static policy config (no live numbers); tune here, zero code change.
alert_hygiene:
  min_baseline_citations: 5      # baseline (prior) week needs ≥5 cited answers to judge a drop (n=2 → suppressed)
  min_relative_drop: 0.20        # ≥20% week-over-week decline counts as a down-cycle.
                                 # HARD FLOOR 0.16 (research noise floor) — may RAISE, never lower below 0.16.
  consecutive_down_cycles: 2     # require ≥2 consecutive down-weeks (each clearing the floors above) before SLIPPING

# OPS-GEO-PROBE-MULTI-RUN-W1 — weekly-probe sampling + pacing config (static policy, no live
# numbers). Read by geo-weekly-cron.ts → runWeeklyProbe (via resolveGeoProbe). Each (query,engine)
# is sampled K times/cycle; the per-(query,engine) citation RATE + Wilson CI is denoised at READ
# time by getQueryRates (geo-rates.ts) — so a single week is trustworthy instead of an engine
# non-determinism coin-flip (LLM retrieval ~16% noise floor). Tuning K / pacing = edit THIS file,
# zero code change. K stays at 3 (architect 2026-06-29: the rate+CI single-derivation is the
# trustworthiness fix and lands at any K; 3→5 buys only ~0.77x CI half-width for ~70% more cost +
# worse gemini 429s — bump a single engine here later for ~free if its CI proves too wide).
probe:
  runs_per_query: 3                 # K — samples per (query, engine) per cycle (all engines)
  runs_per_query_by_engine: {}      # optional per-engine K override, keyed by engineId
                                    #   (claude-web / perplexity / chatgpt / gemini). Empty = all use runs_per_query.
  max_engine_concurrency: 4         # engines swept in PARALLEL (independent APIs/rate-limits); each engine is
                                    #   serial INTERNALLY (concurrency=1 within an engine) — so gemini never bursts.
  inter_sample_delay_ms: 15000      # default pacing between an engine's successive samples (per-engine rate-limit respect)
  inter_sample_delay_ms_by_engine:  # per-engine pacing override
    gemini: 22000                   #   gemini free-tier 429'd ~59% of calls under the old bursty serial loop; even
                                    #   ~3/min pacing + concurrency=1 keeps it well under the free RPM (no hammering).
  low_confidence_min_samples: 3     # a (query,engine) cell with < this many SUCCESSFUL samples is flagged low_confidence
                                    #   at read time (wide Wilson CI) — gemini's frequent partial-K reads honest, never precise-but-wrong.
