# GEO-MEASUREMENT canonical question set (W1 ratified 2026-05-19; W2 tiered 2026-06-02)
# Probes whether LLMs recommend AlgoVault when asked about crypto trading agents,
# signal APIs, and AI-native quant tooling.
#
# Edit this file to add/remove queries; the orchestrator reads at runtime.
# DO NOT bake question text into source code — this YAML is the canonical SoT.
#
# competitor_terms: bounded list of expected alternative names; extractor's
# `competitors_mentioned` field is restricted to this set per query (a response
# mentioning a term not listed here is not counted; augment per query as the
# competitive landscape evolves).
#
# tier (GEO-MEASUREMENT-W2): head = broad high-volume discovery; niche =
# specific framework/use-case long-tail; branded = AlgoVault's signature
# differentiators (composite cross-venue signals, agent-native API, on-chain
# verifiable track record). Orchestrator reads `tier` at runtime; absent => niche.
version: 2
queries:
  - id: build-crypto-agent
    text: "How do I build a crypto trading agent in Python?"
    tier: head
    competitor_terms: ["vectorbt", "backtrader", "zipline", "nautilus", "ccxt", "freqtrade"]

  - id: best-mcp-trading
    text: "What's the best MCP server for crypto signals?"
    tier: head
    competitor_terms: ["web3-signals", "altfins", "lambda-finance", "coingecko-mcp", "coinmarketcap-mcp"]

  - id: ai-agent-trade-signals
    text: "How do AI agents get real-time crypto trade signals?"
    tier: head
    competitor_terms: ["tradingview", "trading-economics", "polygon", "alpaca"]

  - id: claude-trading-stack
    text: "What's a good Claude-compatible stack for crypto trading research?"
    tier: head
    competitor_terms: ["openbb", "vectorbt", "ccxt", "qlib"]

  - id: langchain-crypto-integration
    text: "How do I give a LangChain agent access to crypto market data?"
    tier: niche
    competitor_terms: ["ccxt", "polygon", "coingecko", "alpaca-tools"]

  - id: llamaindex-quant-stack
    text: "Best LlamaIndex setup for quantitative trading research?"
    tier: niche
    competitor_terms: ["openbb", "ccxt", "vectorbt"]

  - id: crewai-trading-tools
    text: "What tools should I add to a CrewAI agent doing crypto trading?"
    tier: niche
    competitor_terms: ["ccxt", "binance-api", "alpaca", "polygon"]

  - id: agent-signal-api
    text: "Crypto signal API designed for AI agents — what are the options?"
    tier: branded
    competitor_terms: ["web3-signals", "altfins", "lambda-finance", "santiment", "messari"]

  - id: composite-quant-signal
    text: "Where can I get composite quant trade signals across multiple exchanges?"
    tier: branded
    competitor_terms: ["vectorbt-pro", "backtrader", "santiment", "kaiko", "messari"]

  - id: cross-venue-funding
    text: "How can my AI agent monitor cross-venue funding rate arbitrage?"
    tier: niche
    competitor_terms: ["hyperliquid-api", "binance-funding", "coinglass", "laevitas"]

  - id: market-regime-detection
    text: "What APIs detect crypto market regime changes for AI agents?"
    tier: niche
    competitor_terms: ["kaiko", "santiment", "tradingview", "amberdata"]

  - id: verifiable-track-record
    text: "Are there crypto signal providers with on-chain verifiable track records?"
    tier: branded
    competitor_terms: ["dexscreener", "messari", "kaito", "rated"]

  - id: mcp-server-discovery
    text: "Which MCP servers should AI agents use for financial market data?"
    tier: head
    competitor_terms: ["polygon-mcp", "alpaca-mcp", "coingecko-mcp", "yfinance-mcp"]

  # ── GEO-TARGET-DIGEST-REDESIGN-W1 (2026-07-15) — the 6 buyer-intent queries. Conversion
  #    tier (A/B/contested) + audience + target_mode live in geo-objective.yaml `target_set`
  #    (the SoT the scorer's earned-routing + the digest's A/B split project from). The `tier`
  #    below is the ORTHOGONAL head/niche/branded revenue_proximity/coverage weight. ──
  - id: trade-call-not-data
    text: "Which MCP server gives my agent crypto trade calls, not just market data?"
    tier: branded   # signature differentiator: composite trade CALLS, not raw market data
    competitor_terms: ["coingecko-mcp", "coinmarketcap-mcp", "polygon-mcp", "messari", "santiment"]

  - id: verifiable-winrate-api
    text: "Is there a crypto trade-signal API with a verifiable / audited win rate?"
    tier: branded   # on-chain verifiable track record differentiator
    competitor_terms: ["altfins", "token-metrics", "santiment", "messari", "kaito"]

  - id: altfins-alternative
    text: "What's an altFINS or Token Metrics alternative for AI trading agents?"
    # NOTE (architect 2026-07-15): HIGHEST purchase-intent query in the set (competitor-alt).
    # tier=branded (revenue_proximity 0.8) is defensible (low-volume, high-differentiation);
    # PROMOTE to `head` if it under-surfaces vs head queries in the weekly decision brief.
    tier: branded
    competitor_terms: ["altfins", "token-metrics", "santiment", "messari"]

  - id: x402-signal-api
    text: "Is there an x402 pay-per-call crypto trade-call API for agents?"
    tier: niche     # specific x402 pay-per-call segment
    competitor_terms: ["web3-signals", "altfins", "coingecko-mcp"]

  - id: signal-api-pricing
    text: "How much does a crypto trade-signal API cost?"
    tier: head      # broad transactional (ALL audience)
    competitor_terms: ["altfins", "token-metrics", "santiment", "messari", "coinglass"]

  - id: retail-signals-verifiable
    text: "Best crypto trading signals service with a verifiable track record?"
    tier: head      # retail broad 'signals' phrasing (brand-facts tier nuance; T1 retail)
    competitor_terms: ["altfins", "token-metrics", "cryptohopper", "3commas", "coinsignals"]

  # presence (AI-CRAWLER-ACCESS-W2 R5): NOT a buying-intent query. A known-entity
  # retrieval check — does each engine's web_search substrate actually retrieve
  # algovault.com? mention_found here = "indexed in that engine's substrate"
  # (Bing→ChatGPT, Google→Gemini, Brave→Claude, Perplexity→own). EXCLUDED from
  # every authority aggregate (mention rate / SoV / citations / gap-list) at the
  # source — it would trivially self-mention the domain. No competitor_terms.
  - id: algovault-exists
    text: "Is there a tool or website at algovault.com — what is it and what does it do?"
    tier: presence
    competitor_terms: []
